# Upstream PDF manuals per hardware variant.
#
# Keys are the PascalCase names of the `Hardware` enum. Each entry maps to a
# public PDF URL. The optional `section` field is a case-insensitive regex
# that marks the start of the firmware-upgrade chapter in the extracted text.
#
# When CADDXFPV reorganizes its download center, update the URLs here, run
# `cargo run -p manuals --bin refresh`, and commit the regenerated
# `src-tauri/resources/instructions.json`.

[hardware.GogglesX]
pdf_url = "https://cdn.shopify.com/s/files/1/0593/7705/0789/files/Walksnail_Avatar_HD_Goggles_X_User_Manual.pdf"
section = "firmware upgrade"

