# Upstream PDF manuals per hardware variant.
#
# URLs are official CADDXFPV Shopify assets. If CADDXFPV re-uploads a manual
# the `?v=<timestamp>` query will change; the refresh job catches that via
# SHA, but if a document 404s, update the URL here and rerun
# `cargo run -p manuals --bin refresh`.
#
# `section` is a case-insensitive regex that marks the start of the upgrade
# chapter. Most CADDXFPV manuals use "Firmware Update" or "Firmware Upgrade";
# the Moonlight manual uses "Update your Moonlight firmware", etc.

[hardware.AvatarSky]
pdf_url = "https://cdn.shopify.com/s/files/1/0036/3921/4169/files/Avatar_V2_Kit_Quickstart_Guide_EN_CHS_V1.0.pdf?v=1717745449&ref=101"
section = "firmware (?:update|upgrade)"

[hardware.AvatarMiniSky]
pdf_url = "https://cdn.shopify.com/s/files/1/0036/3921/4169/files/Avatar_mini_1s_30mm_board_V2_and_V3_Quickstart_Guide_EN_CHS_V1.2.pdf?v=1717745481&ref=101"
section = "firmware (?:update|upgrade)"

[hardware.MoonlightSky]
pdf_url = "https://cdn.shopify.com/s/files/1/0036/3921/4169/files/Avatar_moonlight_kit-manual_EN__CHS_V1.2.pdf?v=1715932623"
section = "(?:firmware|update)\\s+(?:update|upgrade|your)"

[hardware.AvatarGnd]
# The Avatar V1 goggles manual isn't on the current download page; the
# universal "Avatar System Update Procedure" covers the same steps for
# the original goggles SD-card flashing flow.
pdf_url = "https://cdn.shopify.com/s/files/1/0036/3921/4169/files/Avatar_System_Update_Procedure.pdf?v=1717745800"
section = "(?:firmware|system)\\s+(?:update|upgrade)"

