name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-universal
            os: macos-14
            target: universal-apple-darwin
            args: --target universal-apple-darwin
          - platform: windows
            os: windows-latest
            args: ""
          - platform: linux
            os: ubuntu-22.04
            args: ""
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install extra macOS target
        if: matrix.platform == 'macos-universal'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - name: Linux webkit deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev
      - uses: Swatinem/rust-cache@v2
      - run: npm ci

      # Build the Apple signing env map only when the certificate secret is
      # configured — `tauri-action` otherwise tries `security import` with
      # an empty blob and fails. The `env-conditional` step below serialises
      # the right map into GITHUB_ENV.
      - name: Prepare signing env
        id: sign_env
        shell: bash
        run: |
          if [ -n "${{ secrets.APPLE_CERTIFICATE }}" ]; then
            echo "APPLE_CERTIFICATE=${{ secrets.APPLE_CERTIFICATE }}" >> "$GITHUB_ENV"
            echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" >> "$GITHUB_ENV"
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}" >> "$GITHUB_ENV"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.WINDOWS_CERTIFICATE }}" ]; then
            echo "WINDOWS_CERTIFICATE=${{ secrets.WINDOWS_CERTIFICATE }}" >> "$GITHUB_ENV"
            echo "WINDOWS_CERTIFICATE_PASSWORD=${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY=${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" >> "$GITHUB_ENV"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" >> "$GITHUB_ENV"
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Walksnail Updater ${{ github.ref_name }}"
          releaseBody: |
            Unofficial community release — not affiliated with Walksnail or CADDXFPV.

            See CHANGELOG.md for details. macOS / Windows builds in this release
            are **unsigned**; macOS will warn about an unidentified developer.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
