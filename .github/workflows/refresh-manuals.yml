name: Refresh manuals

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p manuals --bin refresh
      - name: Open PR if the manuals changed
        uses: peter-evans/create-pull-request@v8
        with:
          branch: bot/refresh-manuals
          commit-message: "chore(manuals): refresh instructions from upstream PDFs"
          title: "chore(manuals): refresh instructions from upstream PDFs"
          body: |
            Automated refresh of `src-tauri/resources/instructions.json` from
            the upstream PDF manuals listed in `crates/manuals/manifest.toml`.

            Review the diff carefully — PDF extraction is heuristic.
          labels: automated
